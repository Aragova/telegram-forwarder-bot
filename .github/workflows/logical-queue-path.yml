name: Logical Queue Path

on:
  pull_request:

jobs:
  logical-queue-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Compile logical queue path files
        run: python -m compileall app/postgres_repository.py bot.py tests/test_logical_queue_saas_path.py

      - name: Run all tests
        run: pytest -q tests/
