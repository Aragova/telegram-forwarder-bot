<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ViMi — премиум автоматизация Telegram-каналов</title>
  <meta name="description" content="ViMi автоматизирует Telegram-каналы: публикации, видео, тарифы и оплату в одном боте." />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="#" aria-label="ViMi home">
        <img src="assets/vimi-logo.svg" alt="ViMi" loading="lazy" />
      </a>

      <button id="menuToggle" class="menu-toggle" aria-label="Открыть меню">☰</button>

      <nav id="mainNav" class="main-nav">
        <a href="#features" data-i18n="navFeatures"></a>
        <a href="#plans" data-i18n="navPlans"></a>
        <a href="#how" data-i18n="navHow"></a>
        <a href="#faq" data-i18n="navFaq"></a>
        <a href="#support" data-i18n="navSupport"></a>
      </nav>

      <div class="header-actions">
        <div class="lang-switch" role="group" aria-label="Language switch">
          <button class="lang-btn active" data-lang="ru">RU</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <a id="header-open-bot" class="btn btn-primary" href="#" target="_blank" rel="noopener" data-i18n="openBot"></a>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container hero-grid">
        <div class="hero-copy reveal">
          <p class="hero-badge" data-i18n="heroBadge"></p>
          <h1 data-i18n="heroTitle"></h1>
          <p class="hero-subtitle" data-i18n="heroSubtitle"></p>
          <div class="hero-actions">
            <a id="cta-open-bot" class="btn btn-primary" href="#" target="_blank" rel="noopener" data-i18n="openBot"></a>
            <a class="btn btn-ghost" href="#plans" data-i18n="viewPlans"></a>
          </div>
        </div>

        <div class="hero-visual reveal">
          <img class="hero-scene" src="assets/vimi-hero-scene.png" alt="ViMi hero scene" loading="lazy" />
          <article class="float-card f1">📣 <span data-i18n="floatAuto"></span></article>
          <article class="float-card f2">🎬 <span data-i18n="floatVideo"></span></article>
          <article class="float-card f3">📈 <span data-i18n="floatAnalytics"></span></article>
          <article class="float-card f4">₿ <span data-i18n="floatMonet"></span></article>
        </div>
      </div>
    </section>

    <section class="trust-strip">
      <div class="container trust-inner reveal">
        <p class="trust-label" data-i18n="trustLabel"></p>
        <img src="assets/vimi-payment-strip.png" alt="Поддерживаем платежи" loading="lazy" />
      </div>
    </section>

    <section id="features" class="section">
      <div class="container">
        <h2 data-i18n="featuresTitle"></h2>
        <div id="featuresGrid" class="features-grid"></div>
      </div>
    </section>

    <section id="how" class="section how-section">
      <div class="container">
        <h2 data-i18n="howTitle"></h2>
        <div id="stepsGrid" class="steps-grid"></div>
      </div>
    </section>

    <section id="plans" class="section plans-section">
      <div class="container plans-layout">
        <div>
          <h2 data-i18n="plansTitle"></h2>
          <div id="plansGrid" class="plans-grid"></div>
        </div>

        <aside class="payments-side reveal">
          <h3 data-i18n="paymentsTitle"></h3>
          <img src="assets/vimi-payment-methods-card.png" alt="Способы оплаты ViMi" loading="lazy" />
          <div id="paymentsGrid" class="payments-grid"></div>
          <p class="manual-note" data-i18n="manualNote"></p>
        </aside>
      </div>
    </section>

    <section class="section final-cta">
      <div class="container final-cta-inner reveal">
        <img class="final-cta-bg" src="assets/vimi-final-cta.png" alt="ViMi CTA" loading="lazy" />
        <div class="final-cta-content">
          <h2 data-i18n="finalTitle"></h2>
          <p data-i18n="finalSubtitle"></p>
          <a id="footer-open-bot" class="btn btn-primary" href="#" target="_blank" rel="noopener" data-i18n="openBot"></a>
        </div>
      </div>
    </section>

    <section id="faq" class="section">
      <div class="container">
        <h2>FAQ</h2>
        <div id="faqList" class="faq-list"></div>
      </div>
    </section>
  </main>

  <footer id="support" class="site-footer">
    <div class="container footer-grid">
      <div>
        <img src="assets/vimi-logo.svg" alt="ViMi" loading="lazy" class="footer-logo" />
        <p data-i18n="footerDesc"></p>
      </div>
      <div class="footer-links">
        <a id="link-terms" href="ru/terms.html">Terms</a>
        <a id="link-privacy" href="ru/privacy.html">Privacy</a>
        <a id="link-refund" href="ru/refund.html">Refund</a>
        <a id="link-contacts" href="ru/contacts.html">Contacts</a>
        <a id="link-help" href="ru/instructions.html">Instructions</a>
      </div>
      <div class="footer-links">
        <a id="supportLink" href="#" target="_blank" rel="noopener">Telegram support</a>
        <a id="supportEmail" href="#">support@example.com</a>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
